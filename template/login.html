{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<section class="login-section">
  <div class="login-card">
    <h2>Welcome Back</h2>
    <p class="sub">Sign in to access VayuSense dashboard</p>

    {% if error %}
    <div class="login-error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
    {% endif %}

    {% if success %}
    <div class="login-success"><i class="fas fa-circle-check"></i> {{ success }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <input type="hidden" name="next" value="{{ next_url or url_for('dashboard') }}">
      <div class="form-group">
        <label for="username"><i class="fas fa-user"></i> Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required>
      </div>
      <div class="form-group">
        <label for="password"><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary"><i class="fas fa-sign-in-alt"></i> Sign In</button>
    </form>

    <p class="sub" style="margin-top:1rem;margin-bottom:0">
      No account yet?
      <a href="{{ url_for('register') }}">Create one</a>
    </p>
  </div>
</section>
{% endblock %}
