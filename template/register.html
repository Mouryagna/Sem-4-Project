{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<section class="login-section">
  <div class="login-card">
    <h2>Create Account</h2>
    <p class="sub">Register to access the VayuSense dashboard</p>

    {% if error %}
    <div class="login-error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-group">
        <label for="username"><i class="fas fa-user"></i> Username</label>
        <input type="text" id="username" name="username" placeholder="Choose a username" required>
      </div>
      <div class="form-group">
        <label for="email"><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label for="password"><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password" required>
      </div>
      <div class="form-group">
        <label for="confirm_password"><i class="fas fa-shield-alt"></i> Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary"><i class="fas fa-user-plus"></i> Register</button>
    </form>

    <p class="sub" style="margin-top:1rem;margin-bottom:0">
      Already have an account?
      <a href="{{ url_for('login') }}">Sign in</a>
    </p>
  </div>
</section>
{% endblock %}
