{% extends "base.html" %}
{% block title %}Predict AQI{% endblock %}

{% block content %}
<div class="page-header">
  <h1><i class="fas fa-brain"></i> Predict Air Quality</h1>
  <p>Enter current pollutant levels and time details to predict next-hour AQI</p>
</div>

<div class="predict-section">
  <div class="glass-card">
    <form class="predict-form" onsubmit="handlePredict(event)" id="predictForm">
      <!-- Pollutants -->
      <div class="form-group">
        <label for="pm25"><i class="fas fa-smog"></i> PM2.5 (µg/m³)</label>
        <input type="number" id="pm25" name="pm25" value="80" min="0" step="0.1" required>
      </div>
      <div class="form-group">
        <label for="pm10"><i class="fas fa-smog"></i> PM10 (µg/m³)</label>
        <input type="number" id="pm10" name="pm10" value="140" min="0" step="0.1" required>
      </div>
      <div class="form-group">
        <label for="no2"><i class="fas fa-flask"></i> NO₂ (µg/m³)</label>
        <input type="number" id="no2" name="no2" value="35" min="0" step="0.1" required>
      </div>
      <div class="form-group">
        <label for="so2"><i class="fas fa-flask"></i> SO₂ (µg/m³)</label>
        <input type="number" id="so2" name="so2" value="12" min="0" step="0.1" required>
      </div>
      <div class="form-group">
        <label for="co"><i class="fas fa-cloud"></i> CO (mg/m³)</label>
        <input type="number" id="co" name="co" value="1.0" min="0" step="0.01" required>
      </div>
      <div class="form-group">
        <label for="o3"><i class="fas fa-sun"></i> O₃ (µg/m³)</label>
        <input type="number" id="o3" name="o3" value="28" min="0" step="0.1" required>
      </div>

      <!-- Time -->
      <div class="form-group">
        <label for="hour"><i class="far fa-clock"></i> Hour (0–23)</label>
        <input type="number" id="hour" name="hour" value="10" min="0" max="23" required>
      </div>
      <div class="form-group">
        <label for="day"><i class="far fa-calendar"></i> Day (1–31)</label>
        <input type="number" id="day" name="day" value="15" min="1" max="31" required>
      </div>
      <div class="form-group">
        <label for="month"><i class="far fa-calendar-alt"></i> Month (1–12)</label>
        <input type="number" id="month" name="month" value="6" min="1" max="12" required>
      </div>
      <div class="form-group">
        <label for="weekday"><i class="fas fa-calendar-week"></i> Day of Week</label>
        <select id="weekday" name="weekday" required>
          <option value="Monday">Monday</option>
          <option value="Tuesday">Tuesday</option>
          <option value="Wednesday" selected>Wednesday</option>
          <option value="Thursday">Thursday</option>
          <option value="Friday">Friday</option>
          <option value="Saturday">Saturday</option>
          <option value="Sunday">Sunday</option>
        </select>
      </div>
      <div class="form-group full-width">
        <label for="season"><i class="fas fa-leaf"></i> Season</label>
        <select id="season" name="season" required>
          <option value="Summer">Summer</option>
          <option value="Monsoon">Monsoon</option>
          <option value="Post_Monsoon">Post Monsoon</option>
          <option value="Winter" selected>Winter</option>
        </select>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="predictBtn">
          <i class="fas fa-brain"></i> Predict AQI
        </button>
      </div>
    </form>
  </div>

  <!-- Result Card -->
  <div class="result-card" id="resultCard">
    <div class="result-label">Predicted Next-Hour AQI</div>
    <i id="resultIcon" class="fas fa-smile-beam" style="font-size:2.5rem;margin:.75rem 0"></i>
    <div class="result-aqi" id="resultAqi">--</div>
    <div class="result-cat" id="resultCat">--</div>
    <div style="margin-top:1.25rem">
      <a href="{{ url_for('history') }}" class="btn btn-outline btn-sm"><i class="fas fa-clock-rotate-left"></i> View History</a>
    </div>
  </div>
</div>
{% endblock %}
